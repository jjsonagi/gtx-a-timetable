const $stations=document.getElementById('stations');
const $status=document.getElementById('status');
const $clock=document.getElementById('clock');
const $hint=document.getElementById('hint');

document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    state.seg=t.dataset.seg;
    state.dir = state.seg==="south" ? 1 : 1;
    state.station = META[state.seg].endpoints[state.dir].origin;
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
    setupDir(); renderStations(); render();
  };
});
document.querySelectorAll('.dir button').forEach(b=>{
  b.onclick=()=>{
    state.dir=+b.dataset.dir;
    state.station = META[state.seg].endpoints[state.dir].origin;
    document.querySelectorAll('.dir button').forEach(x=>x.classList.toggle('active',x===b));
    renderStations(); render();
  };
});

function setupDir(){
  const btns=document.querySelectorAll('.dir button');
  btns.forEach((b,i)=>{
    b.textContent=META[state.seg].dirNames[i];
    b.classList.toggle('active', i===state.dir);
  });
}

function renderStations(){
  $stations.innerHTML='';
  META[state.seg].stations.forEach(s=>{
    const key=`${state.seg}|${state.dir}|${s}`;
    const info=TT[key];
    const el=document.createElement('div');
    el.className='st'+(s===state.station?' active':'')+(info && !info.origin?' est':'');
    el.textContent=s;
    el.onclick=()=>{ state.station=s; renderStations(); render(); };
    $stations.appendChild(el);
  });
  const ep=META[state.seg].endpoints[state.dir];
  $hint.innerHTML=`${ep.origin} 첫차 ${ep.first} · 막차 ${ep.last} <br>역 칩을 탭하면 그 역 기준으로 가까운 열차가 강조됩니다. <span style="color:#999">~ 표시 = 통과 시각 추정</span>`;
}

function pad(n){return String(n).padStart(2,'0');}
function fmt(h,m){return pad(h%24)+':'+pad(m);}

function buildTrains(){
  const key=`${state.seg}|${state.dir}|${state.station}`;
  const info=TT[key];
  if(!info) return {trains:[],estimated:false};
  const out=[];
  for(const h in info.times){
    for(const m of info.times[h]){
      const hh=+h, mm=+m;
      // hh가 24,25 등이면 다음날 시각으로 처리
      out.push({h:hh, m:mm, key:hh*60+mm, lastTrain:false});
    }
  }
  out.sort((a,b)=>a.key-b.key);
  return {trains:out, estimated: !info.origin};
}

function render(){
  setupDir();
  const {trains, estimated} = buildTrains();
  const now=new Date();
  // 현재시각을 분 단위로. 새벽 0~4시는 "전일 24~28시"로 매핑하여 막차까지 비교
  let nowKey = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
  if(now.getHours() < 5) nowKey += 24*60; // 0~4시는 전일 24~28시로 간주

  let nextIdx = trains.findIndex(t=>t.key>=nowKey);
  if(nextIdx===-1) nextIdx=trains.length;

  $list.innerHTML='';
  if(trains.length===0){
    $list.innerHTML='<div class="empty">해당 역의 시간표가 없습니다.</div>';
    $status.textContent='운행 정보 없음';
    return;
  }

  trains.forEach((t,i)=>{
    const row=document.createElement('div');
    row.className='row '+(i<nextIdx?'past':(i===nextIdx?'next':''));
    const eta=t.key-nowKey;
    let etaText='';
    if(i===nextIdx){
      if(eta<1) etaText='곧 도착';
      else if(eta<60) etaText=`${Math.ceil(eta)}분 후`;
      else etaText=`${Math.floor(eta/60)}시간 ${Math.ceil(eta%60)}분 후`;
    } else if(i<nextIdx){ etaText='지났음'; }
    row.innerHTML=`<div class="tm">${fmt(t.h,t.m)}${i===nextIdx?'<span class="badge">NEXT</span>':''}</div><div class="eta">${etaText}</div>`;
    $list.appendChild(row);
  });

  if(nextIdx<trains.length){
    const t=trains[nextIdx];
    const eta=t.key-nowKey;
    const etaT=eta<1?'곧 도착':(eta<60?`${Math.ceil(eta)}분 후`:`${Math.floor(eta/60)}시간 ${Math.ceil(eta%60)}분 후`);
    const dest=META[state.seg].endpoints[state.dir].dest;
    const est = estimated ? ' (추정)' : '';
    $status.innerHTML=`${state.station}역${est} → ${dest} 방면<br><b>다음 ${fmt(t.h,t.m)}</b> · ${etaT}`;
  } else {
    $status.textContent=`${state.station}역 · 금일 운행 종료 (내일 첫차 대기)`;
  }

  const nextEl=$list.children[nextIdx];
  if(nextEl) setTimeout(()=>nextEl.scrollIntoView({block:'center',behavior:'smooth'}), 100);
}

function tick(){
  const d=new Date();
  $clock.textContent=fmt(d.getHours(),d.getMinutes())+':'+pad(d.getSeconds());
}

// 초기: 남부 하행, 수서역 (사용자가 가장 쓸 가능성 높은 케이스)
state.seg="south"; state.dir=1; state.station="수서";
setupDir(); renderStations(); render();
tick();
setInterval(tick,1000);
setInterval(render,30000);
</script>
</body>
</html>
