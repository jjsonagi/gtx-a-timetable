<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTX-A 시간표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c18;
    --surface: #0f1628;
    --surface2: #17213a;
    --gtx: #00d4ff;
    --gtx2: #0066ff;
    --accent: #ff4d6d;
    --green: #00e5a0;
    --text: #e4ecff;
    --muted: #5a6888;
    --border: rgba(255,255,255,0.06);
    --glow: 0 0 30px rgba(0,212,255,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(8,12,24,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 860px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding: 0 20px; height: 58px;
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-badge {
    background: linear-gradient(135deg, var(--gtx), var(--gtx2));
    color:#000; font-family:'Space Mono',monospace; font-size:0.8rem;
    font-weight:700; padding:4px 10px; border-radius:6px; letter-spacing:2px;
  }
  .logo-text { font-size:1rem; font-weight:700; letter-spacing:1px; }
  .clock {
    font-family:'Space Mono',monospace; font-size:1rem;
    color: var(--gtx); letter-spacing:2px;
  }

  /* HERO */
  .hero {
    background: linear-gradient(160deg,#0c1428 0%,#081020 100%);
    padding: 32px 20px 24px; position:relative; overflow:hidden;
  }
  .hero::after {
    content:'';
    position:absolute; top:-80px; right:-60px;
    width:360px; height:360px; border-radius:50%;
    background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
    pointer-events:none;
  }
  .hero-inner { max-width:860px; margin:0 auto; }
  .hero h1 { font-size:1.75rem; font-weight:900; line-height:1.25; }
  .hero h1 em { color:var(--gtx); font-style:normal; }
  .hero-sub { margin-top:8px; font-size:0.83rem; color:var(--muted); letter-spacing:0.5px; }

  /* ROUTE MAP */
  .section { max-width:860px; margin:0 auto; padding:24px 20px 0; }
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:20px;
  }
  .card-label {
    font-size:0.68rem; letter-spacing:2.5px; color:var(--muted);
    text-transform:uppercase; font-weight:700; margin-bottom:16px;
  }

  /* ROUTE LINE */
  .route-scroll { overflow-x:auto; padding-bottom:4px; }
  .route-line {
    display:flex; align-items:flex-start; min-width:580px; position:relative;
  }
  .rstation {
    display:flex; flex-direction:column; align-items:center;
    min-width:64px; cursor:pointer;
  }
  .rdot-wrap {
    display:flex; align-items:center; width:100%; justify-content:center;
    position:relative;
  }
  .rdot-line {
    height:3px; flex:1;
    background: linear-gradient(90deg, var(--gtx), var(--gtx2));
  }
  .rdot-line.gap {
    background: repeating-linear-gradient(
      90deg,var(--muted) 0,var(--muted) 5px,transparent 5px,transparent 10px
    ); opacity:0.3;
  }
  .rdot-line.hidden { visibility:hidden; }
  .rdot {
    width:13px; height:13px; border-radius:50%;
    border:2.5px solid var(--gtx); background:var(--surface);
    flex-shrink:0; transition:all 0.2s; z-index:1;
  }
  .rstation.terminus .rdot {
    width:17px; height:17px;
    background:var(--gtx); box-shadow:0 0 12px rgba(0,212,255,0.5);
  }
  .rstation.seg-active .rdot {
    background:rgba(0,212,255,0.25);
    box-shadow:0 0 10px rgba(0,212,255,0.4);
  }
  .rstation.wip .rdot { border-color:var(--muted); }
  .rname {
    margin-top:9px; font-size:0.66rem; color:var(--muted);
    text-align:center; white-space:nowrap; font-weight:500; line-height:1.3;
  }
  .rstation.terminus .rname { color:var(--text); font-weight:700; }
  .rstation.seg-active .rname { color:var(--gtx); }
  .wip-tag { color:var(--accent); font-size:0.58rem; display:block; }

  /* TABS */
  .tabs { display:flex; gap:10px; margin-bottom:20px; }
  .tab {
    flex:1; padding:13px 10px; text-align:center;
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:12px; color:var(--muted); cursor:pointer;
    font-family:inherit; font-size:0.82rem; font-weight:700;
    transition:all 0.2s; line-height:1.4;
  }
  .tab.active {
    background:rgba(0,212,255,0.08);
    border-color:var(--gtx); color:var(--gtx);
    box-shadow: var(--glow);
  }
  .tab small { font-weight:400; font-size:0.72rem; }

  /* INFO PILLS */
  .pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .pill {
    flex:1; min-width:120px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:10px 14px;
    display:flex; align-items:center; gap:10px;
  }
  .pill-ico { font-size:1.1rem; }
  .pill-info { display:flex; flex-direction:column; }
  .pill-lbl { font-size:0.67rem; color:var(--muted); }
  .pill-val { font-size:0.88rem; font-weight:700; }

  /* CONTROLS */
  .ctrl-row {
    display:flex; align-items:center; gap:10px;
    margin-bottom:18px; flex-wrap:wrap;
  }
  .dir-grp { display:flex; border-radius:10px; overflow:hidden; border:1px solid var(--border); }
  .dir-btn {
    padding:9px 16px; font-family:inherit; font-size:0.78rem; font-weight:700;
    background:none; border:none; color:var(--muted); cursor:pointer;
    transition:all 0.2s; white-space:nowrap;
  }
  .dir-btn.active { background:var(--gtx); color:#000; }

  .day-grp { display:flex; gap:6px; margin-left:auto; }
  .day-btn {
    padding:7px 13px; border-radius:8px;
    font-family:inherit; font-size:0.75rem; font-weight:700;
    background:var(--surface); border:1px solid var(--border);
    color:var(--muted); cursor:pointer; transition:all 0.2s;
  }
  .day-btn.active { background:rgba(0,212,255,0.1); border-color:var(--gtx); color:var(--gtx); }

  /* NEXT TRAIN */
  .next-card {
    background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(0,102,255,0.05));
    border:1px solid rgba(0,212,255,0.22); border-radius:14px;
    padding:18px 20px; margin-bottom:18px;
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .next-label { font-size:0.67rem; color:var(--gtx); letter-spacing:2px; font-weight:700; margin-bottom:6px; }
  .next-time { font-family:'Space Mono',monospace; font-size:2.1rem; font-weight:700; line-height:1; }
  .next-route { font-size:0.78rem; color:var(--muted); margin-top:5px; }
  .cd-box { text-align:right; }
  .cd-num { font-family:'Space Mono',monospace; font-size:1.6rem; font-weight:700; color:var(--gtx); }
  .cd-lbl { font-size:0.72rem; color:var(--muted); }

  /* TABLE */
  .tbl-wrap {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; overflow:hidden; margin-bottom:40px;
  }
  .tbl-head {
    display:grid; background:var(--surface2);
    border-bottom:1px solid var(--border);
  }
  .th {
    padding:11px 10px; font-size:0.67rem; letter-spacing:1.5px;
    color:var(--muted); text-transform:uppercase; font-weight:700; text-align:center;
    border-right:1px solid var(--border);
  }
  .th:first-child { text-align:left; padding-left:16px; }
  .th:last-child { border-right:none; }

  .tbl-row {
    display:grid; border-bottom:1px solid rgba(255,255,255,0.035);
    cursor:pointer; transition:background 0.12s;
  }
  .tbl-row:last-child { border-bottom:none; }
  .tbl-row:hover { background:rgba(0,212,255,0.03); }
  .tbl-row.is-next { background:rgba(0,212,255,0.05); border-left:3px solid var(--gtx); }
  .tbl-row.is-past { opacity:0.32; }

  .td {
    padding:13px 10px; font-family:'Space Mono',monospace;
    font-size:0.82rem; text-align:center;
    border-right:1px solid rgba(255,255,255,0.03);
  }
  .td:first-child { text-align:left; padding-left:16px; color:var(--muted); font-size:0.75rem; }
  .td:last-child { border-right:none; }

  .next-badge {
    display:block; font-size:0.58rem; color:var(--gtx);
    letter-spacing:1px; margin-top:2px; font-family:'Noto Sans KR',sans-serif;
  }

  @media(max-width:600px) {
    .hero h1 { font-size:1.35rem; }
    .next-time { font-size:1.5rem; }
    .tab { font-size:0.76rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-badge">GTX-A</div>
      <div class="logo-text">시간표</div>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <h1>수도권 광역급행철도<br><em>GTX-A</em> 노선</h1>
    <div class="hero-sub">운정중앙 ↔ 서울역 &nbsp;·&nbsp; 수서 ↔ 동탄 &nbsp;·&nbsp; 최고 180km/h</div>
  </div>
</div>

<!-- ROUTE MAP -->
<div class="section">
  <div class="card">
    <div class="card-label">노선도</div>
    <div class="route-scroll">
      <div class="route-line" id="routeLine"></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="section" style="padding-top:20px; padding-bottom:0;">

  <div class="tabs">
    <button class="tab" onclick="setSeg('north')">
      🔵 북부 구간<br><small>운정중앙 ↔ 서울역</small>
    </button>
    <button class="tab active" onclick="setSeg('south')">
      🔵 남부 구간<br><small>수서 ↔ 동탄</small>
    </button>
  </div>

  <div class="pills" id="pillsRow"></div>

  <div class="ctrl-row">
    <div class="dir-grp" id="dirGrp">
      <button class="dir-btn active" id="d0" onclick="setDir(0)">←</button>
      <button class="dir-btn" id="d1" onclick="setDir(1)">→</button>
    </div>
    <div class="day-grp">
      <button class="day-btn active" id="dwk" onclick="setDay('week')">평일</button>
      <button class="day-btn" id="dsat" onclick="setDay('sat')">토요일</button>
      <button class="day-btn" id="dhol" onclick="setDay('hol')">공휴일</button>
    </div>
  </div>

  <div class="next-card">
    <div>
      <div class="next-label">▶ NEXT TRAIN</div>
      <div class="next-time" id="nt">--:--</div>
      <div class="next-route" id="nr">--</div>
    </div>
    <div class="cd-box">
      <div class="cd-num" id="cdn">--</div>
      <div class="cd-lbl" id="cdl">분 후 출발</div>
    </div>
  </div>

</div>

<div class="section" style="padding-top:0; padding-bottom:40px;">
  <div class="tbl-wrap" id="tblWrap"></div>
</div>

function toMin(t) {
  let [h,m]=t.split(':').map(Number);
  if(h<5) h+=24;
  return h*60+m;
}
function addM(t,m) {
  let [h,mn]=t.split(':').map(Number);
  let tot=h*60+mn+m;
  return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');
}
function nowMin() {
  const d=new Date(); return d.getHours()*60+d.getMinutes();
}

  {n:'서울역',s:'both'},
  {n:'삼성',s:'wip',wip:true},
  {n:'수서',s:'south'},{n:'성남',s:'south'},{n:'구성',s:'south'},{n:'동탄',s:'south'},
];
function buildRoute() {
  const el=document.getElementById('routeLine'); el.innerHTML='';
  ALL_STATIONS.forEach((st,i)=>{
    const node=document.createElement('div');
    const isTerm=(i===0||i===ALL_STATIONS.length-1);
    const isActive=(seg==='north'&&st.s==='north')||(seg==='south'&&st.s==='south')||st.s==='both';
    node.className='rstation'+(isTerm?' terminus':'')+(isActive?' seg-active':'')+(st.wip?' wip':'');

    const lineL=i>0?`<div class="rdot-line${ALL_STATIONS[i-1].wip||st.wip?' gap':''}"></div>`:'<div class="rdot-line hidden"></div>';
    const lineR=i<ALL_STATIONS.length-1?`<div class="rdot-line${st.wip?' gap':''}"></div>`:'<div class="rdot-line hidden"></div>';

    node.innerHTML=`<div class="rdot-wrap">${lineL}<div class="rdot"></div>${lineR}</div><div class="rname">${st.n}${st.wip?'<span class="wip-tag">공사중</span>':''}</div>`;
    el.appendChild(node);
  });
}

function buildPills() {
  const d=DATA[seg];
  document.getElementById('pillsRow').innerHTML=d.pills.map(p=>
    `<div class="pill"><span class="pill-ico">${p.ico}</span><div class="pill-info"><div class="pill-lbl">${p.lbl}</div><div class="pill-val">${p.val}</div></div></div>`
  ).join('');
}

function buildDirBtns() {
  const d=DATA[seg];
  document.getElementById('d0').textContent=d.dirs[0];
  document.getElementById('d1').textContent=d.dirs[1];
  document.getElementById('d0').className='dir-btn'+(dir===0?' active':'');
  document.getElementById('d1').className='dir-btn'+(dir===1?' active':'');
}

function buildTable() {
  const d=DATA[seg];
  const sch=d.sch[day][dir];
  const stas=dir===0?[...d.stations]:[...d.stations].reverse();
  const tms=dir===0?[...d.tMin]:[...d.tMin].map(m=>d.tMin[d.tMin.length-1]-m).reverse();
  const nm=nowMin();

  let nextIdx=-1;
  for(let i=0;i<sch.length;i++){
    if(toMin(sch[i])>=nm){nextIdx=i;break;}
  }

  // Next card
  if(nextIdx>=0){
    const dep=sch[nextIdx];
    const diff=toMin(dep)-nm;
    document.getElementById('nt').textContent=dep;
    document.getElementById('nr').textContent=`${stas[0]} 출발 → ${stas[stas.length-1]} 도착 ${addM(dep,tms[tms.length-1])}`;
    document.getElementById('cdn').textContent=diff===0?'지금':diff;
    document.getElementById('cdl').textContent=diff===0?'출발!':'분 후 출발';
  } else {
    document.getElementById('nt').textContent='운행 종료';
    document.getElementById('nr').textContent='오늘 운행이 종료되었습니다';
    document.getElementById('cdn').textContent='--';
    document.getElementById('cdl').textContent='';
  }

  const colsFr=stas.map(()=>'1fr').join(' ');
  const gridCols=`80px ${colsFr}`;

  const s=Math.max(0,nextIdx-4);
  const e=Math.min(sch.length,nextIdx+28);

  let html=`<div class="tbl-head" style="grid-template-columns:${gridCols}">
    <div class="th" style="text-align:left">열차</div>
    ${stas.map(s=>`<div class="th">${s}</div>`).join('')}
  </div>`;

  for(let i=s;i<e;i++){
    const dep=sch[i];
    const dm=toMin(dep);
    const past=dm<nm, next=i===nextIdx;
    const times=stas.map((_,si)=>addM(dep,tms[si]));
    html+=`<div class="tbl-row${next?' is-next':''}${past?' is-past':''}" style="grid-template-columns:${gridCols}">
      <div class="td">${String(i+1).padStart(3,'0')}${next?'<span class="next-badge">▶ NEXT</span>':''}</div>
      ${times.map(t=>`<div class="td">${t}</div>`).join('')}
    </div>`;
  }

  document.getElementById('tblWrap').innerHTML=html;
}

function setSeg(s) {
  seg=s; dir=0;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&s==='north')||(i===1&&s==='south')));
  buildRoute(); buildPills(); buildDirBtns(); buildTable();
}
function setDir(d){ dir=d; buildDirBtns(); buildTable(); }
function setDay(d){
  day=d;
  ['wk','sat','hol'].forEach((k,i)=>{
    document.getElementById('d'+k).className='day-btn'+(['week','sat','hol'][i]===d?' active':'');
  });
  buildTable();
}

// clock
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}

buildRoute(); buildPills(); buildDirBtns(); buildTable();
tick(); setInterval(tick,1000);
setInterval(buildTable,30000);
</script>
</body>
</html>
